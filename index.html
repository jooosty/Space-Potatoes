<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula Xplorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="easter-egg.css">
</head>
<body>

  <!-- Navbar -->
  <nav>
    <span class="nav-logo">Nebula Xplorer</span>
    <ul class="nav-links">
      <li><a href="#">Mission</a></li>
      <li><a href="#">Science</a></li>
      <li><a href="#">Crew</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- Sterren achtergrond -->
  <div class="stars"></div>

  <!-- Hero -->
  <div class="hero">
    <div>
      <h1>Nebula Xplorer</h1>
      <p>Mission in Development</p>
    </div>
    <div class="black-hole-container">
      <div class="purple-shadow"></div>
      <div class="black-hole"></div>
    </div>
  </div>

  <!-- Scroll hint -->
  <div class="scroll-hint">
    <span>Explore Mission</span>
    <div class="arrow"></div>
  </div>

  <!-- Easter egg overlay -->
  <div id="egg-overlay">
    <canvas id="egg-canvas"></canvas>
  </div>

  <script src="script.js"></script>
  <script src="easter-egg.js"></script>
</body>
</html>
